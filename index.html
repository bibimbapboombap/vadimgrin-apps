<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Just Chess Clock</title>
<meta name="description" content="Track each player's time with a distraction-free interface. Tap to switch turns, choose your time control, and just play chess.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Podkova:wght@700&display=swap" rel="stylesheet">

  <header class="masthead">

  <main class="hero">
    <div class="hero__content">
      <img class="hero__icon" src="assets/app-icon.png?v=20260721" alt="" width="92" height="92">

        <img src="assets/app-store-badge.svg?v=20260721" alt="Download on the App Store" width="180" height="60">

    <div class="phones" aria-hidden="true">

        <img class="phone__screen" src="assets/screen-1.png?v=20260721" alt="">

      <div class="phone phone--back">
        <img class="phone__screen" src="assets/screen-2.png?v=20260721" alt="">

  <footer class="footer">
    <a class="footer__link" href="mailto:vadym.gryn@gmail.com">Support</a>
    <span class="footer__dot" aria-hidden="true">&middot;</span>
